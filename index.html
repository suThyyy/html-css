<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>
            .box {
                width: 100px;
                height: 100px;
                color: #fff;
                background-color: red;
                padding: 16px;
                border: solid 2px black;
                box-sizing: border-box;
                box-sizing: unset ;
            }
            /* box-sizing: content - box: là mặc định của box sizing
box-sizing: border - box: trừ đi để cho đúng với width height đã khai báo ban đầu
box-sizing: unset: hủy box-sizing: border - box */
        </style>
    </head>
    <body>
        <div class="box">This is the content of the box</div>
    </body>
</html>
