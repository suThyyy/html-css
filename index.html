<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>
            html {
                font-size: 50px;
            }

           .box {
                width: 50%;
                /* Kich thuoc dua tren thẻ của nó, ở đây thẻ của box là body */
                height: 100px;
                background-color: red;
           }

           h1 {
            font-size: 1rem;
            /* phu thuoc vao kich thuoc cua the html */
           }

           h2 {
            font-size: 1em;
            /* Phu thuoc vao the gan nhat chua no co thuoc tinh font-size */
           }

           /* vw - viewport width, vh - viewport height 
              khung nhin*/

           .box {
            width: 80vw;
            /* ti le voi chieu ngang cua trinh duyet */
            height: 10vh;
            /* ti le voi chieu doc cua trinh duyet */
            background-color: blue;
           }
        </style>
    </head>
    <body>
        <div class="box"></div>
        <div style="font-size: 100px;">
           <h1>CSS Units?</h1>
           <h2>Demo em</h2>
        </div>
    </body>
</html>
