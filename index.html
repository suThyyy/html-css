<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>

            html, body {
                margin: 0;
            }

            .header {
                width: 100%;
                height: 100vh;
                background-image: url(https://thuvienanime.net/wp-content/uploads/2023/09/tong-quan-uyen-thuvienanime-6-1.jpg);
                background-repeat: no-repeat;
                background-size: 500px;
                background-position: top 100px right 10px;
                /* background-position: 

_top right là ảnh trên góc phải
_bottom left là ảnh dưới góc trái

CÁC VD KHÁC:
_ghi 1 giá trị top thì sẽ hiểu là
top center .v.v.v

_ghi 50px thì ảnh sẽ cách mép trái 50px và center giữa .v.v.v

_ghi top 20px right 20px hiểu là cách top 20px cách phải 20px.

_ghi 30px 50px hiểu là
30 là X trục tung NGANG
50 là Y trục hoành DỌC

Có thể dùng px hoặc %. hoặc số âm để ngược ảnh lên xuống */
            }
        </style>
    </head>
    <body>
        <div class="header"></div>
    </body>
</html>
