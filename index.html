<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>

            html, body {
                margin: 0;
            }

            .header {
                width: 100%;
                height: 100vh;
                background-image: linear-gradient(0, rgba(255, 255, 0, 0.5), rgba(0, 255, 255, 0.5)),
                                    url(https://pbs.twimg.com/media/FP8vCzmXMAUVKQU.png);
                background-size: 100px;
            }
            /* background-image: url(); thêm ảnh vào nền web
background-size: canh chỉnh ảnh
background-repeat: repeat/ no-repeat/ repeat-x, y là tung hoành dài và dọc
background-image: linear-gradient(*, *, *)
dấu *1 là độ nghiêng ảnh >0 thêm deg vào
2 *3 có thể cho màu rgba(*, *, *, *) gồm 4 là màu sắc */
        </style>
    </head>
    <body>
        <div class="header"></div>
    </body>
</html>
