<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>

            html, body {
                margin: 0;
            }

            .header {
                width: 100%;
                height: 100vh;
                background-image: url(https://thuvienanime.net/wp-content/uploads/2023/09/tong-quan-uyen-thuvienanime-6-1.jpg);
                background-repeat: no-repeat;
                background-size: 100%;
                border: 20px dashed #ccc;
                padding: 20px;
                box-sizing: border-box;
                background-origin: content-box ;
                /* background-origin :  ( dùng như background-clip)  nhưng apply for image
content-box : đổ background vào content
padding-box : đổ background vào padding
border-box : đổ background vào border */
            }
        </style>
    </head>
    <body>
        <div class="header"></div>
    </body>
</html>
