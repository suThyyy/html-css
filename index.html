<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>
            .box {
                width: 60px;
                height: 60px;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center; 
            }

            .box1 {
                background-color: #333;
            }

            .box2 {
                background-color: orange;
            }

            .box3 {
                background-color: firebrick;
               /* Để giải quyết tách từng box ra xa nhau, thực tế padding và border chỉ tự tăng kích thước */
                /* margin khong tu tang kich thuoc chinh no */
               margin-top: 20px;
               margin: 10px;
               margin: 10px 20px;
               margin: 10px 20px 30px;
               margin: 10px 20px 30px 40px;
            }
        </style>
    </head>
    <body>
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box box3">Box 3</div>
    </body>
</html>
