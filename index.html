<!DOCTYPE html>
<html>
    <head>
        <title>suThy's shop</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="main.css">

        <style>

            html, body {
                margin: 0;
            }

            .header {
                width: 100%;
                height: 100px;
                background-color: red;
                padding: 20px;
                box-sizing: border-box;
                border: 10px dashed black;
                background-clip: border-box;
            }
            /* Background-clip: tuỳ chọn tô màu background cho content hoặc padding trở vào hoặc border trở vào */
        </style>
    </head>
    <body>
        <div class="header"></div>
    </body>
</html>
